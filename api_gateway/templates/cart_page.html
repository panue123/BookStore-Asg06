<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Books – Giỏ hàng</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#2E6E94;--pl:#78AFCB;--pll:#EEF6FB;--pd:#245A7A;--bg:#F2F7FA;--s:#fff;--t:#13283A;--tm:#597185;--b:#D3E3EE;--sh:0 2px 16px rgba(46,110,148,.10);--shl:0 8px 40px rgba(46,110,148,.18);--r:14px;--rs:10px}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
button,input,select,textarea{font-family:inherit}
nav{background:var(--s);padding:.75rem 2rem;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:300;gap:1rem;border-bottom:1px solid var(--b)}
.logo{font-size:1.3rem;font-weight:800;color:var(--pd);text-decoration:none;display:flex;align-items:center;gap:.4rem}
.logo em{color:var(--p);font-style:normal}
.nav-right{display:flex;gap:.5rem;align-items:center}
.btn{padding:.45rem 1rem;border-radius:var(--rs);font-weight:600;font-size:.85rem;border:none;cursor:pointer;transition:all .2s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-o{background:transparent;border:1.5px solid var(--p);color:var(--p)}.btn-o:hover{background:var(--pll)}
.btn-sm{padding:.35rem .75rem;font-size:.8rem}
.btn-ghost{background:transparent;border:1px solid var(--b);color:var(--tm)}.btn-ghost:hover{border-color:var(--p);color:var(--p)}
main{flex:1;padding:1.5rem 2rem;max-width:1100px;margin:0 auto;width:100%}
.page-hdr{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.page-title{font-size:1.4rem;font-weight:800}
.cart-layout{display:grid;grid-template-columns:1fr 360px;gap:1.5rem;align-items:start}
/* Items */
.items-box{background:var(--s);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border:1px solid var(--b)}
.items-hdr{padding:1rem 1.25rem;border-bottom:1.5px solid var(--b);display:flex;justify-content:space-between;align-items:center;background:#F8FBFE}
.items-hdr-title{font-weight:700;font-size:.95rem}
.cart-item{display:flex;gap:1rem;padding:1rem 1.25rem;border-bottom:1px solid var(--b);align-items:center;transition:background .15s}
.cart-item:last-child{border-bottom:none}
.cart-item:hover{background:#F8FBFE}
.ci-cover{width:64px;height:84px;border-radius:var(--rs);overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--pll),#DCECF6);display:flex;align-items:center;justify-content:center;font-size:1.6rem}
.ci-cover img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-title{font-weight:700;font-size:.92rem;margin-bottom:.2rem;line-height:1.3}
.ci-author{font-size:.8rem;color:var(--tm);margin-bottom:.35rem}
.ci-unit{font-size:.8rem;color:var(--tm)}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem;flex-shrink:0}
.ci-subtotal{font-weight:800;color:var(--pd);font-size:.95rem}
.qty-ctrl{display:flex;align-items:center;gap:.4rem}
.qty-btn{width:28px;height:28px;border:1.5px solid var(--b);border-radius:7px;background:var(--bg);color:var(--pd);font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.qty-btn:hover{background:var(--pll);border-color:var(--p)}
.qty-val{font-weight:700;font-size:.9rem;min-width:24px;text-align:center}
.btn-remove{background:none;border:none;color:#94A3B8;font-size:.8rem;cursor:pointer;padding:.2rem .4rem;border-radius:6px;transition:all .2s}
.btn-remove:hover{background:#FEE2E2;color:#EF4444}
.empty-cart{text-align:center;padding:3.5rem 1rem;color:var(--tm)}
.empty-icon{font-size:3.5rem;margin-bottom:.85rem}
/* Summary */
.summary-box{background:var(--s);border-radius:var(--r);box-shadow:var(--sh);padding:1.25rem;position:sticky;top:5rem;border:1px solid var(--b)}
.summary-title{font-weight:700;font-size:1rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:2px solid var(--b)}
.summary-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:.6rem;color:var(--tm)}
.summary-total{display:flex;justify-content:space-between;font-weight:800;font-size:1.1rem;padding-top:.85rem;border-top:2px dashed var(--b);margin-top:.5rem;color:var(--pd)}
.form-group{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.85rem}
.form-group label{font-size:.8rem;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{padding:.55rem .8rem;border:1.5px solid var(--b);border-radius:var(--rs);color:var(--t);background:#F8FAFC;font-size:.88rem;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(46,110,148,.12)}
.btn-checkout{width:100%;padding:.9rem;background:var(--p);color:#fff;border:none;border-radius:var(--rs);font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem;letter-spacing:.02em}
.btn-checkout:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(46,110,148,.3)}
.btn-checkout:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
/* Saga */
.saga-box{background:var(--bg);border-radius:var(--rs);padding:.9rem;margin-top:.85rem;border:1px solid var(--b)}
.saga-title{font-weight:700;font-size:.85rem;margin-bottom:.5rem;color:var(--tm)}
.saga-step{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px solid var(--b);font-size:.82rem}
.saga-step:last-child{border:none}
.step-ok{color:#059669;font-weight:700}.step-fail{color:#DC2626;font-weight:700}.step-wait{color:var(--tm)}
/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--pd);color:#fff;padding:.75rem 1.2rem;border-radius:var(--rs);font-size:.85rem;font-weight:600;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;max-width:320px;box-shadow:var(--shl)}
.toast.show{opacity:1;transform:translateY(0)}.toast.err{background:#DC2626}.toast.ok{background:#059669}
.spin{display:inline-block;width:22px;height:22px;border:2.5px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:2.5rem;color:var(--tm)}
@media(max-width:768px){.cart-layout{grid-template-columns:1fr}.summary-box{position:static}main{padding:1rem}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">🌙 Moon<em>Books</em></a>
  <div class="nav-right">
    <span id="navUser" style="font-size:.88rem;font-weight:600;color:var(--pd)"></span>
    <a href="/" class="btn btn-ghost btn-sm">← Tiếp tục mua sắm</a>
    <button class="btn btn-o btn-sm" id="logoutBtn" style="display:none" onclick="doLogout()">Đăng xuất</button>
  </div>
</nav>
<main>
  <div class="page-hdr">
    <div class="page-title">🛒 Giỏ hàng của tôi</div>
    <span id="itemCountBadge" style="background:var(--pll);color:var(--pd);padding:.2rem .65rem;border-radius:20px;font-size:.8rem;font-weight:700"></span>
  </div>
  <div class="cart-layout">
    <div>
      <div class="items-box">
        <div class="items-hdr">
          <span class="items-hdr-title" id="itemCount">Đang tải...</span>
          <button class="btn btn-ghost btn-sm" onclick="loadCart()">🔄 Làm mới</button>
        </div>
        <div id="cartItemsPane"><div class="loading"><div class="spin"></div></div></div>
      </div>
    </div>
    <div class="summary-box">
      <div class="summary-title">📋 Tóm tắt đơn hàng</div>
      <div class="summary-row"><span>Số lượng sản phẩm</span><span id="sumQty">0</span></div>
      <div class="summary-row"><span>Tạm tính</span><span id="sumSubtotal">0₫</span></div>
      <div class="summary-row"><span>Phí vận chuyển</span><span style="color:#059669;font-weight:600">Miễn phí</span></div>
      <div class="summary-total"><span>Tổng cộng</span><span id="sumTotal">0₫</span></div>
      <div style="margin-top:1.25rem">
        <div class="form-group" id="savedAddrWrap" style="display:none">
          <label>Địa chỉ đã lưu</label>
          <select id="savedAddr" title="Địa chỉ đã lưu" aria-label="Địa chỉ đã lưu" onchange="onSavedAddressChange()"></select>
        </div>
        <div class="form-group" id="manualAddrGroup">
          <label>Địa chỉ giao hàng</label>
          <textarea id="shipAddr" rows="2" placeholder="Nhập địa chỉ giao hàng đầy đủ..."></textarea>
        </div>
        <div class="form-group">
          <label>Phương thức thanh toán</label>
          <select id="payMethod" title="Phương thức thanh toán" aria-label="Phương thức thanh toán">
            <option value="credit_card">💳 Thẻ tín dụng / Ghi nợ</option>
            <option value="cod">💵 Thanh toán khi nhận hàng (COD)</option>
            <option value="bank_transfer">🏦 Chuyển khoản ngân hàng</option>
          </select>
        </div>
        <button class="btn-checkout" id="checkoutBtn" onclick="checkout()">✅ Đặt hàng ngay</button>
        <div id="checkoutMsg" style="font-size:.82rem;color:var(--tm);margin-top:.5rem;text-align:center"></div>
        <div id="sagaBox" style="display:none" class="saga-box">
          <div class="saga-title">⚙️ Đang xử lý đơn hàng...</div>
          <div id="sagaSteps"></div>
        </div>
      </div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
let user = null, cartData = null;
let savedAddresses = [];
const API = '/api';
const EMOJI = {programming:'💻',science:'🔬',history:'📜',fiction:'📖',math:'📐'};

document.addEventListener('DOMContentLoaded', () => {
  try { user = JSON.parse(localStorage.getItem('cb_user')||'null'); } catch(e){}
  if (!user) { window.location.href = '/customer-login/?next=/cart/'; return; }
  document.getElementById('navUser').textContent = '👤 ' + user.username;
  document.getElementById('logoutBtn').style.display = '';
  loadSavedAddresses();
  loadCart();
});

function toast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.className='toast', 3200);
}
function fmt(n) { return Number(n).toLocaleString('vi-VN')+'₫'; }
function authH() {
  const h={'Content-Type':'application/json'};
  if(user?.access_token) h['Authorization']='Bearer '+user.access_token;
  return h;
}
function doLogout() { localStorage.removeItem('cb_user'); window.location.href='/customer-login/'; }

function fmtAddr(a) {
  const street = (a?.street || '').trim();
  const city = (a?.city || '').trim();
  const country = (a?.country || '').trim();
  return [street, city, country].filter(Boolean).join(', ');
}

async function loadSavedAddresses() {
  const selectWrap = document.getElementById('savedAddrWrap');
  const select = document.getElementById('savedAddr');
  const manualGroup = document.getElementById('manualAddrGroup');
  const manualInput = document.getElementById('shipAddr');

  if (!selectWrap || !select || !manualGroup || !manualInput) return;

  savedAddresses = [];
  try {
    const r = await fetch(`${API}/addresses/`, { headers: authH() });
    if (r.ok) {
      const data = await r.json();
      const list = Array.isArray(data) ? data : (data.results || []);
      savedAddresses = list.filter(a => fmtAddr(a));
    }
  } catch (e) {}

  if (!savedAddresses.length) {
    selectWrap.style.display = 'none';
    manualGroup.style.display = '';
    manualInput.value = '';
    manualInput.placeholder = 'Nhập địa chỉ giao hàng đầy đủ...';
    return;
  }

  selectWrap.style.display = '';
  manualGroup.style.display = 'none';
  select.innerHTML = savedAddresses.map((a, idx) => {
    const text = fmtAddr(a);
    return `<option value="${idx}">${text}</option>`;
  }).join('') + '<option value="__manual__">+ Nhập địa chỉ khác...</option>';
  select.value = '0';
  onSavedAddressChange();
}

function onSavedAddressChange() {
  const select = document.getElementById('savedAddr');
  const manualGroup = document.getElementById('manualAddrGroup');
  const manualInput = document.getElementById('shipAddr');
  if (!select || !manualGroup || !manualInput) return;

  if (select.value === '__manual__') {
    manualGroup.style.display = '';
    manualInput.value = '';
    manualInput.placeholder = 'Nhập địa chỉ giao hàng đầy đủ...';
    return;
  }

  manualGroup.style.display = 'none';
  const idx = Number(select.value);
  if (Number.isInteger(idx) && savedAddresses[idx]) {
    manualInput.value = fmtAddr(savedAddresses[idx]);
  }
}

async function loadCart() {
  if (!user?.service_user_id) return;
  let cartId = user.cart_id;
  if (!cartId) {
    try {
      const r = await fetch(`${API}/customers/${user.service_user_id}/`, {headers:authH()});
      if (r.ok) { const d=await r.json(); cartId=d.cart_id; user.cart_id=cartId; localStorage.setItem('cb_user',JSON.stringify(user)); }
    } catch(e){}
  }
  if (!cartId) {
    document.getElementById('cartItemsPane').innerHTML='<div class="empty-cart"><div class="empty-icon">🛒</div><div style="font-weight:600;margin-bottom:.5rem">Giỏ hàng trống</div><a href="/" class="btn btn-p btn-sm" style="display:inline-block;margin-top:.5rem">Khám phá sách ngay</a></div>';
    document.getElementById('itemCount').textContent='0 sản phẩm';
    updateSummary([]);
    return;
  }
  try {
    const r = await fetch(`${API}/carts/${cartId}/`, {headers:authH()});
    if (!r.ok) throw new Error();
    cartData = await r.json();
    renderCart();
  } catch(e) {
    document.getElementById('cartItemsPane').innerHTML='<div class="empty-cart"><div class="empty-icon">⚠️</div>Không thể tải giỏ hàng</div>';
  }
}

function renderCart() {
  const items = cartData?.items||[];
  const pane = document.getElementById('cartItemsPane');
  const count = items.length;
  document.getElementById('itemCount').textContent = count+' sản phẩm';
  document.getElementById('itemCountBadge').textContent = count+' sản phẩm';
  if (!items.length) {
    pane.innerHTML='<div class="empty-cart"><div class="empty-icon">🛒</div><div style="font-weight:600;font-size:1rem;margin-bottom:.5rem">Giỏ hàng trống</div><p style="font-size:.88rem;margin-bottom:1rem">Hãy thêm sách vào giỏ để tiếp tục</p><a href="/" class="btn btn-p btn-sm" style="display:inline-block">Khám phá sách ngay</a></div>';
    updateSummary([]);
    return;
  }
  pane.innerHTML = items.map(item=>`
    <div class="cart-item" id="ci-${item.id}">
      <div class="ci-cover" id="cover-${item.book_id}"><span>${EMOJI['fiction']||'📚'}</span></div>
      <div class="ci-info">
        <div class="ci-title" id="title-${item.book_id}">Đang tải...</div>
        <div class="ci-author" id="author-${item.book_id}"></div>
        <div class="ci-unit">${fmt(item.price_at_add)} / cuốn</div>
      </div>
      <div class="ci-right">
        <div class="ci-subtotal">${fmt(parseFloat(item.price_at_add)*item.quantity)}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="updateQty(${item.book_id},${item.quantity-1})">−</button>
          <input type="number" min="1" max="999" value="${item.quantity}" style="width:52px;text-align:center;border:1.5px solid var(--b);border-radius:var(--rs);padding:.25rem;font-size:.88rem;font-weight:700;background:#F8FAFC" onchange="updateQty(${item.book_id},parseInt(this.value)||1)" onblur="if(!this.value||this.value<1)this.value=1">
          <button class="qty-btn" onclick="updateQty(${item.book_id},${item.quantity+1})">+</button>
        </div>
        <button class="btn-remove" onclick="updateQty(${item.book_id},0)">🗑 Xóa</button>
      </div>
    </div>`).join('');
  updateSummary(items);
  items.forEach(item=>fetchBookInfo(item.book_id));
}

async function fetchBookInfo(bookId) {
  try {
    const r = await fetch(`${API}/books/${bookId}/`);
    if (!r.ok) return;
    const b = await r.json();
    const titleEl = document.getElementById('title-'+bookId);
    const authorEl = document.getElementById('author-'+bookId);
    const coverEl = document.getElementById('cover-'+bookId);
    if (titleEl) titleEl.textContent = b.title||'Sách #'+bookId;
    if (authorEl) authorEl.textContent = b.author||'';
    if (coverEl && b.cover_image_url) {
      coverEl.innerHTML = `<img src="${b.cover_image_url}" alt="${b.title}" onerror="this.parentElement.innerHTML='<span>${EMOJI[b.category]||'📚'}</span>'">`;
    } else if (coverEl) {
      coverEl.innerHTML = `<span>${EMOJI[b.category]||'📚'}</span>`;
    }
  } catch(e){}
}

function updateSummary(items) {
  const qty = items.reduce((s,i)=>s+i.quantity,0);
  const total = items.reduce((s,i)=>s+(parseFloat(i.price_at_add)*i.quantity),0);
  document.getElementById('sumQty').textContent = qty;
  document.getElementById('sumSubtotal').textContent = fmt(total);
  document.getElementById('sumTotal').textContent = fmt(total);
}

async function updateQty(bookId, newQty) {
  const cartId = user.cart_id||cartData?.id;
  if (!cartId) return;
  try {
    const r = await fetch(`${API}/carts/${cartId}/update_item_quantity/`,{method:'POST',headers:authH(),body:JSON.stringify({book_id:bookId,quantity:newQty})});
    if (r.ok) { cartData=await r.json(); renderCart(); toast(newQty===0?'Đã xóa sản phẩm':'Đã cập nhật số lượng','ok'); }
    else { const d=await r.json(); toast(d.error||'Không thể cập nhật','err'); }
  } catch(e) { toast('Lỗi kết nối','err'); }
}

async function checkout() {
  const items = cartData?.items||[];
  if (!items.length) { toast('Giỏ hàng trống','err'); return; }
  const select = document.getElementById('savedAddr');
  const manual = document.getElementById('shipAddr').value.trim();
  let addr = manual;

  if (savedAddresses.length && select && select.value !== '__manual__') {
    const idx = Number(select.value);
    addr = Number.isInteger(idx) && savedAddresses[idx] ? fmtAddr(savedAddresses[idx]) : '';
  }

  if (!addr) { toast('Vui lòng nhập địa chỉ giao hàng','err'); return; }
  const payMethod = document.getElementById('payMethod').value;
  const cartId = user.cart_id||cartData?.id;
  const btn = document.getElementById('checkoutBtn');
  const msgEl = document.getElementById('checkoutMsg');
  const sagaBox = document.getElementById('sagaBox');
  const sagaSteps = document.getElementById('sagaSteps');
  btn.disabled=true; btn.textContent='⏳ Đang xử lý...';
  msgEl.textContent=''; sagaBox.style.display='block';
  sagaSteps.innerHTML='<div class="saga-step"><span class="step-wait">⏳</span> Đang khởi tạo đơn hàng...</div>';
  try {
    const r = await fetch(`${API}/orders/checkout/`,{method:'POST',headers:authH(),body:JSON.stringify({customer_id:user.service_user_id,cart_id:cartId,shipping_address:addr,payment_method:payMethod})});
    const d = await r.json();
    if (r.ok && d.success) {
      const steps = d.saga_steps||[];
      sagaSteps.innerHTML = steps.map(s=>`<div class="saga-step"><span class="${s.status==='ok'?'step-ok':'step-fail'}">${s.status==='ok'?'✓':'✗'}</span> ${stepLabel(s.step)}</div>`).join('');
      toast('Đặt hàng thành công! 🎉','ok');
      msgEl.innerHTML=`<span style="color:#059669;font-weight:600">✅ Đơn hàng #${d.order?.id} đã được tạo!</span>`;
      cartData=null;
      setTimeout(()=>window.location.href='/',2500);
    } else {
      sagaSteps.innerHTML=`<div class="saga-step"><span class="step-fail">✗</span> ${d.error||'Đặt hàng thất bại'}</div>`;
      toast(d.error||'Đặt hàng thất bại','err');
    }
  } catch(e) {
    sagaSteps.innerHTML='<div class="saga-step"><span class="step-fail">✗</span> Lỗi kết nối</div>';
    toast('Lỗi kết nối','err');
  } finally { btn.disabled=false; btn.textContent='✅ Đặt hàng ngay'; }
}

function stepLabel(step) {
  return {reserve_payment:'Xử lý thanh toán',reserve_shipping:'Tạo vận đơn',confirm_order:'Xác nhận đơn hàng',clear_cart:'Xóa giỏ hàng',update_stock:'Cập nhật tồn kho'}[step]||step;
}
</script>
</body>
</html>
