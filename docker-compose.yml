services:
  # ═══════════════════════════════════════════════════════════
  # DATABASES
  # ═══════════════════════════════════════════════════════════
  db-mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookstore_db
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bookstore_db
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ═══════════════════════════════════════════════════════════
  # MESSAGE BROKER
  # ═══════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.12-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ═══════════════════════════════════════════════════════════
  # AUTH SERVICE
  # ═══════════════════════════════════════════════════════════
  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=auth_service.settings
      - DB_NAME=bookstore_auth
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql
      - JWT_SECRET=super-secret-jwt-key-change-in-production-2024
      - JWT_ACCESS_MINUTES=60
      - JWT_REFRESH_DAYS=7

  # ═══════════════════════════════════════════════════════════
  # CORE MICROSERVICES
  # ═══════════════════════════════════════════════════════════
  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=customer_service.settings
      - DB_NAME=bookstore_customer
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  # product-service replaces book-service as the primary product catalog
  product-service:
    build: ./product-service
    ports:
      - "8013:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - product_media:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - POSTGRES_DB=bookstore_product
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - DB_HOST=db-postgres

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=cart_service.settings
      - POSTGRES_DB=bookstore_cart
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - DB_HOST=db-postgres
      - PRODUCT_SERVICE_URL=http://product-service:8000

  order-service:
    build: ./order-service
    ports:
      - "8004:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=order_service.settings
      - DB_NAME=bookstore_order
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  pay-service:
    build: ./pay-service
    ports:
      - "8005:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=pay_service.settings
      - DB_NAME=bookstore_pay
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  ship-service:
    build: ./ship-service
    ports:
      - "8006:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=ship_service.settings
      - DB_NAME=bookstore_ship
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  staff-service:
    build: ./staff-service
    ports:
      - "8007:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=staff_service.settings
      - DB_NAME=bookstore_staff
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql
      - PRODUCT_SERVICE_URL=http://product-service:8000

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8008:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=comment_rate_service.settings
      - POSTGRES_DB=bookstore_comment
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - DB_HOST=db-postgres

  manager-service:
    build: ./manager-service
    ports:
      - "8010:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=manager_service.settings
      - DB_NAME=bookstore_manager
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql
      - PRODUCT_SERVICE_URL=http://product-service:8000

  # ═══════════════════════════════════════════════════════════
  # KNOWLEDGE GRAPH (Neo4j) — for hybrid recommendation
  # ═══════════════════════════════════════════════════════════
  neo4j:
    image: neo4j:5
    restart: always
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/neo4j_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ═══════════════════════════════════════════════════════════
  # AI SERVICE
  # ═══════════════════════════════════════════════════════════
  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
      product-service:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ai_artifacts:/app/artifacts
      - ai_kb_data:/app/data
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=recommender_ai_service.settings
      - POSTGRES_DB=bookstore_recommender
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - DB_HOST=db-postgres
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - COMMENT_SERVICE_URL=http://comment-rate-service:8000
      - SHIP_SERVICE_URL=http://ship-service:8000
      - PAY_SERVICE_URL=http://pay-service:8000
      - ARTIFACTS_DIR=/app/artifacts
      - EMBED_DIM=64
      - LOG_LEVEL=INFO
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_password

  # ═══════════════════════════════════════════════════════════
  # API GATEWAY
  # ═══════════════════════════════════════════════════════════
  api-gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - customer-service
      - product-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - staff-service
      - comment-rate-service
      - recommender-ai-service
    networks:
      - app-network
    environment:
      - DEBUG=1
      - JWT_SECRET=super-secret-jwt-key-change-in-production-2024
      - PRODUCT_SERVICE_URL=http://product-service:8000

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  rabbitmq_data:
  neo4j_data:
  ai_artifacts:
  ai_kb_data:
  product_media:
